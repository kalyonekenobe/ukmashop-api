services:
  backend:
    image: kalyonekenobe/ukmashop:backend
    platform: linux/amd64
    build:
      dockerfile: Dockerfile.development
    container_name: ukmashop-backend
    networks:
      - ukmashop-network
    env_file:
      - ./env/.env.development
    ports:
      - ${DOCKER_EXTERNAL_BACKEND_PORT}:${BACKEND_PORT}
    volumes:
      - ./src:/app/src
      - ./generated/prisma:/app/generated/prisma
      - ./prisma:/app/prisma
      - ./api-swagger.json:/app/api-swagger.json:rw
      - /app/node_modules
    depends_on:
      database:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4096M
    restart: on-failure

  database:
    image: kalyonekenobe/ukmashop:database
    build:
      dockerfile_inline: |
        FROM postgres:17
    container_name: ukmashop-database
    networks:
      - ukmashop-network
    env_file:
      - ./env/.env.development
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - ${DOCKER_EXTERNAL_DATABASE_PORT}:5432
    volumes:
      - ukmashop-database-volume:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ['CMD-SHELL', "sh -c 'pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}'"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: on-failure

  nginx:
    image: kalyonekenobe/ukmashop:nginx
    platform: linux/amd64
    build:
      dockerfile_inline: |
        FROM nginx:latest
    container_name: ukmashop-nginx
    networks:
      - ukmashop-network
    env_file: ./env/.env.development
    ports:
      - ${DOCKER_EXTERNAL_NGINX_PORT}:80
    volumes:
      - ./nginx/default.development.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ['CMD-SHELL', 'service nginx status || exit 1']
      interval: 10s
      timeout: 3s
      retries: 3
    restart: on-failure

networks:
  ukmashop-network:
    driver: bridge

volumes:
  ukmashop-database-volume:
